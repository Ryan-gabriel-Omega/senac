<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema</title>
    <link rel="stylesheet" href="styleform.css">
</head>

<body>

    <h1>Avatar: Fogo e Cinzas</h1>

    <form id="formulario">

        <p>Qual a sua idade</p>

        <input type="number" id="idade" required>

        <p>Qual o seu sexo</p>

        <input type="radio" name="sexo" value="masculino" required> Masculino

        <input type="radio" name="sexo" value="feminino"> Feminino

        <hr>

        <p>O que você achou do filme</p>

        <input type="radio" name="avaliacao" value="excelente" required> Excelente<br>

        <input type="radio" name="avaliacao" value="bom"> Bom<br>

        <input type="radio" name="avaliacao" value="regular"> Regular<br>

        <input type="radio" name="avaliacao" value="pessimo"> Péssimo<br><br>

        <button type="submit">Adicionar</button>

    </form>
    <br>

    <button onclick="encerrar()">Encerrar</button>

    <div id="resultado"></div>

    <script src="javaformu.js"></script>
</body>

</html>
